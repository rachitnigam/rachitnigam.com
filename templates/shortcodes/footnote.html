<label for="sn-{{ nth }}"
       class="margin-toggle sidenote-number"
       style="white-space:nowrap">
  <span class="sidenote-number-text">{{ nth }}</span>
</label>
<input type="checkbox"
       id="sn-{{ nth }}"
       class="margin-toggle"/>
<span class="sidenote">
<span class="sidenote-prefix">{{ nth }}</span>
{{ body | markdown(inline=true) | trim | safe }}
</span>
